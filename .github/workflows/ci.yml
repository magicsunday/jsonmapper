name: CI

on:
    push:
        branches: [main, master, '*.x', WIP]
    pull_request:

permissions:
    contents: read

jobs:
    build:
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                php: ['8.3', '8.4', '8.5']

        steps:
            - name: Set up PHP version ${{ matrix.php }}
              uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
              with:
                  php-version: ${{ matrix.php }}
                  tools: composer:v2, php-cs-fixer

            - name: Checkout repository
              uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
              with:
                  persist-credentials: false

            - name: Validate composer.json and composer.lock
              run: composer validate

            - name: Get composer cache directory
              id: composer-cache
              run: |
                  echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
            - name: Cache Composer dependencies
              uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
              with:
                  path: ${{ steps.composer-cache.outputs.dir }}
                  key: ${{ runner.os }}-${{ matrix.php }}-composer-${{ hashFiles('**/composer.json') }}
                  restore-keys: |
                      ${{ runner.os }}-${{ matrix.php }}-composer-

            - name: Install dependencies
              run: |
                  composer install --prefer-dist --no-interaction --no-progress

            - name: Lint
              run: |
                  composer ci:test:php:lint

            - name: Unit Tests
              if: ${{ !cancelled() }}
              run: |
                  composer ci:test:php:unit

            - name: PHPStan
              if: ${{ !cancelled() }}
              run: |
                  composer ci:test:php:phpstan -- --error-format=github

            - name: Rector
              if: ${{ !cancelled() }}
              run: |
                  composer ci:test:php:rector

            - name: CGL
              if: ${{ !cancelled() }}
              run: |
                  composer ci:test:php:cgl

            - name: CPD
              if: ${{ !cancelled() }}
              run: composer ci:test:php:cpd

    production-install:
        name: Production install (--no-dev)
        runs-on: ubuntu-latest

        steps:
            - name: Set up PHP version 8.3
              uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
              with:
                  php-version: '8.3'
                  tools: composer:v2

            - name: Checkout repository
              uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
              with:
                  persist-credentials: false

            # The build job always installs development dependencies, so it structurally cannot
            # detect a runtime dependency that is declared under "require-dev" only. This job
            # reproduces a consumer installation and constructs the mapper in it. The install is
            # deliberately uncached: a cold resolve is what a real consumer performs, and the
            # build job's cache key covers a different (dev) package set.
            - name: Install dependencies without dev requirements
              run: |
                  composer install --no-dev --prefer-dist --no-interaction --no-progress

            - name: Construct the mapper and map a payload
              run: |
                  php .github/scripts/production-install-smoke.php

    coverage:
        name: Coverage gate
        runs-on: ubuntu-latest

        steps:
            # A single interpreter is enough: line coverage does not vary by PHP version, so the
            # gate is not run per matrix leg. pcov rather than Xdebug for a faster coverage run.
            - name: Set up PHP version 8.3
              uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
              with:
                  php-version: '8.3'
                  coverage: pcov
                  tools: composer:v2

            - name: Checkout repository
              uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
              with:
                  persist-credentials: false

            - name: Get composer cache directory
              id: composer-cache
              run: |
                  echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
            - name: Cache Composer dependencies
              uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
              with:
                  path: ${{ steps.composer-cache.outputs.dir }}
                  key: ${{ runner.os }}-8.3-composer-${{ hashFiles('**/composer.json') }}
                  restore-keys: |
                      ${{ runner.os }}-8.3-composer-

            - name: Install dependencies
              run: |
                  composer install --prefer-dist --no-interaction --no-progress

            # Runs the coverage suite and fails when line coverage drops below the target the
            # definition of done in AGENTS.md documents.
            - name: Enforce the coverage target
              run: |
                  composer ci:test:php:coverage:gate
